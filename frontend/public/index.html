<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luggage Monitor</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

.screen {
  display:none;
  padding:15px;
  padding-bottom:90px;
}

.active {
  display:block;
}

.statusBox {
  width:70vw;
  max-width:260px;
  height:70vw;
  max-height:260px;
  margin:20px auto;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:gray;
}

.card {
  background:white;
  padding:15px;
  margin:12px;
  border-radius:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input {
  width:80px;
  padding:5px;
  font-size:16px;
  text-align:center;
}

button {
  padding:10px 15px;
  font-size:16px;
  border-radius:10px;
  border:none;
  background:#007bff;
  color:white;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ccc;
}

.nav button {
  flex:1;
  padding:14px 5px;
  font-size:14px;
  background:white;
  color:black;
}
</style>
</head>

<body>

<!-- USER VIEW -->
<!-- CHANGE HERE FOR USER NAME TAG*************-->
<div id="user" class="screen active">
<h1 id="userTitle">User's Luggage</h1>
<div id="userStatusBox" class="statusBox">--</div>
<p id="userAlertText" style="color:red;font-weight:bold;"></p>
</div>

<!-- DEVELOPER STATUS -->

<div id="status" class="screen">
<h1>Developer Status</h1>

<div id="statusBox" class="statusBox">--</div>

<div class="card">
<h2 id="distance">Distance: --</h2>
<h2 id="state">State: --</h2>
<p id="alertText" style="color:red;font-weight:bold;"></p>
</div>

<div class="card">
<h3>Recent Alerts</h3>
<div id="log" style="
  text-align:left;
  max-height:150px;
  overflow-y:auto;
  font-size:14px;
"></div>
</div>
</div>

<!-- WHEELCHAIR -->

<div id="wheelchair" class="screen">
<h1>Wheelchair</h1>
<div class="card">
<h2 id="battery">Battery: --</h2>
<h2 id="link">Link: --</h2>
<h2 id="server">Server: --</h2>
<h3 id="lastUpdate"></h3>
</div>
</div>

<!-- SETTINGS -->

<div id="settings" class="screen">
<h1>Settings</h1>

<div class="card">

<h3>User Name</h3>
<input id="userNameInput" type="text">
<button onclick="saveUserName()">Save</button>

<br><br>

<h3>Alert Thresholds (cm)</h3>

<p>Normal max:</p>
<input id="normalInput" type="number">

<p>Caution max:</p>
<input id="cautionInput" type="number">

<br><br>
<button onclick="saveThresholds()">Save Thresholds</button>

<p id="saveMsg"></p>

</div>
</div>

<!-- NAV -->

<div class="nav">
<button onclick="show('user')">User</button>
<button onclick="show('status')">Developer</button>
<button onclick="show('wheelchair')">Chair</button>
<button onclick="show('settings')">Settings</button>
</div>

<script>

/* ---------- Navigation ---------- */

function show(id){
  document.querySelectorAll('.screen')
    .forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------- Threshold Storage ---------- */

let thresholds = JSON.parse(localStorage.getItem("thresholds")) || {
  normalMax:150,
  cautionMax:300
};

normalInput.value = thresholds.normalMax;
cautionInput.value = thresholds.cautionMax;

function saveThresholds(){
  thresholds.normalMax = Number(normalInput.value);
  thresholds.cautionMax = Number(cautionInput.value);

  localStorage.setItem("thresholds", JSON.stringify(thresholds));
  saveMsg.innerText = "Saved!";
}

/* ---------- User Name ---------- */

let userName = localStorage.getItem("userName") || "User";

userNameInput.value = userName;
updateUserTitle();

function saveUserName(){
  userName = userNameInput.value || "User";
  localStorage.setItem("userName", userName);
  updateUserTitle();
}

function updateUserTitle(){
  userTitle.innerText = `${userName}'s Luggage`;
}

/* ---------- Alert Log ---------- */

let lastState = "";

function addLog(msg){
  const time = new Date().toLocaleTimeString();

  log.innerHTML = `${time} - ${msg}<br>` + log.innerHTML;

  let entries = log.innerHTML.split("<br>");
  entries = entries.filter(e => e.trim() !== "");

  if(entries.length > 10){
    entries = entries.slice(0,10);
  }

  log.innerHTML = entries.join("<br>") + "<br>";
}

/* ---------- Fetch Data ---------- */

async function fetchData(){

  const prox = await fetch('/api/proximity').then(r=>r.json());
  const status = await fetch('/api/status').then(r=>r.json());

  let distance = prox.distance_cm;

  let state = "normal";

  if(distance > thresholds.cautionMax)
    state = "separation";
  else if(distance > thresholds.normalMax)
    state = "caution";

  /* ----- Developer View ----- */

  distanceEl.innerText = "Distance: " + distance + " cm";
  stateEl.innerText = "State: " + state;

  statusBox.innerText = state.toUpperCase();

  if(state==="normal") statusBox.style.background="green";
  else if(state==="caution") statusBox.style.background="orange";
  else statusBox.style.background="red";

  alertText.innerText =
    (state==="separation") ? "LUGGAGE TOO FAR" : "";

  /* ----- User View ----- */

  userStatusBox.innerText = state.toUpperCase();

  if(state==="normal") userStatusBox.style.background="green";
  else if(state==="caution") userStatusBox.style.background="orange";
  else userStatusBox.style.background="red";

  userAlertText.innerText =
    (state==="separation") ? "LUGGAGE TOO FAR" : "";

  /* ----- Logs ----- */

  if(state !== lastState){
    if(state==="caution") addLog("Caution zone entered");
    if(state==="separation") addLog("Separation detected");
    if(state==="normal" && lastState!=="") addLog("Returned to normal");
  }

  lastState = state;

  /* ----- Wheelchair ----- */

  battery.innerText = "Battery: " + status.battery_level + "%";
  link.innerText = "Link: " + status.link_state;
  server.innerText = "Server: " + status.server_state;
  lastUpdate.innerText =
    "Updated: " + new Date(status.last_update_time).toLocaleTimeString();
}

/* ---------- Shortcuts ---------- */

const distanceEl = document.getElementById("distance");
const stateEl = document.getElementById("state");
const statusBox = document.getElementById("statusBox");
const userStatusBox = document.getElementById("userStatusBox");
const alertText = document.getElementById("alertText");
const userAlertText = document.getElementById("userAlertText");
const battery = document.getElementById("battery");
const link = document.getElementById("link");
const server = document.getElementById("server");
const lastUpdate = document.getElementById("lastUpdate");
const log = document.getElementById("log");

/* ---------- Start ---------- */

setInterval(fetchData,1000);
fetchData();

</script>

</body>
</html>
